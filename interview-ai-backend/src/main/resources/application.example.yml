server:
  port: 8080

spring:
  application:
    name: interview-ai

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://<YOUR_MYSQL_HOST>:3306/interview_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: <YOUR_DB_USERNAME>
    password: <YOUR_DB_PASSWORD>

  data:
    redis:
      host: <YOUR_REDIS_HOST>
      port: 6379
      password: <YOUR_REDIS_PASSWORD>
      database: 1
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  ai:
    openai:
      api-key: <YOUR_DEEPSEEK_API_KEY>
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
        enabled: true

  dashscope:
    api-key: <YOUR_DASHSCOPE_API_KEY>
    embedding:
      enabled: true
      options:
        model: text-embedding-v4
        dimensions: 1024

  rabbitmq:
    host: <YOUR_RABBITMQ_HOST>
    port: 5672
    username: <YOUR_RABBITMQ_USERNAME>
    password: <YOUR_RABBITMQ_PASSWORD>
    virtual-host: /interview-ai

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  upload-dir: ./uploads
  qdrant:
    host: <YOUR_QDRANT_HOST>
    port: 6334

jwt:
  secret: ${JWT_SECRET:change-this-to-a-random-secret}
  expiration: 604800000

logging:
  level:
    com.interviewai: debug
